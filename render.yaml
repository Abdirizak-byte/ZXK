databases:
  - name: zxk-cpm-tracker-db
    plan: basic-256mb
    region: oregon

services:
  - type: web
    name: zxk-cpm-tracker
    runtime: docker
    plan: starter
    region: oregon
    rootDir: cpm-tracker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /login.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: zxk-cpm-tracker-db
          property: connectionString
