<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard — Shorts Payout Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="api.js"></script>
  <style>
    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 5px;
      animation: live-pulse 1.6s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .monthly-snapshot {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div>
        <a class="back-link" href="https://abdirizak-byte.github.io/ZXK/">← Back to zxkie.com</a>
        <h1 id="clipperName">Loading…</h1>
        <p id="clipperNotes"></p>
      </div>
      <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        <select class="select-control" id="periodFilter">
          <option value="all">Lifetime</option>
          <option value="7">Last 7 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="365">Last 365 days</option>
          <option value="custom">Custom range</option>
        </select>
        <div id="customRangeRow" style="display: none; align-items: center; gap: 8px;">
          <input class="select-control" type="date" id="customStart" />
          <span style="color: var(--muted);">to</span>
          <input class="select-control" type="date" id="customEnd" />
          <button class="btn btn-sm" id="customApplyBtn" type="button">Apply</button>
        </div>
        <button class="btn btn-ghost" id="logoutBtn" type="button">Log Out</button>
      </div>
    </div>

    <div id="historyNotice" style="display: none; margin: 0 0 16px; padding: 10px 14px; background: var(--amber-soft); color: var(--amber); font-size: 12.5px; font-weight: 600; border-radius: 8px;"></div>

    <section class="stats">
      <div class="stat-card">
        <div class="label">Shorts Tracked</div>
        <div class="value" id="statShorts">0</div>
      </div>
      <div class="stat-card">
        <div class="label" id="statViewsLabel">Total Views</div>
        <div class="value" id="statViews">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Earned (period)</div>
        <div class="value" id="statEarned">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Paid</div>
        <div class="value" id="statPaid">$0.00</div>
      </div>
    </section>

    <div class="panel" style="margin-bottom: 20px;">
      <div class="panel-head">
        <h2>This Month</h2>
      </div>
      <div class="monthly-snapshot" id="monthlySnapshot" style="padding: 14px 18px;"></div>
    </div>

    <div class="panel" style="margin-bottom: 20px;">
      <div class="panel-head">
        <h2>My Channels</h2>
      </div>
      <div id="channelsList" style="padding: 14px 18px;"></div>
    </div>

    <div class="panel" style="margin-bottom: 20px;">
      <div class="panel-head">
        <h2>My Clips</h2>
        <div class="shorts-sort-bar" style="padding: 0;">
          <span class="shorts-sort-label">Sort by</span>
          <select class="select-control select-sm clip-sort-key">
            <option value="views" selected>Views</option>
            <option value="date">Date posted</option>
          </select>
          <button class="btn btn-sm clip-sort-dir" type="button">↓ Desc</button>
        </div>
      </div>
      <div id="shortsBody" style="padding: 0 0 14px;"></div>
    </div>

    <div class="panel" id="payoutsPanel">
      <div class="panel-head">
        <h2>Payout History</h2>
      </div>
      <div id="payoutsList" style="padding: 4px 18px 14px;"></div>
    </div>
  </div>

  <script>
    const clipperId = new URLSearchParams(location.search).get("id");
    if (!clipperId) {
      document.body.innerHTML = '<div class="page"><p>Missing clipper id.</p></div>';
      throw new Error("missing id");
    }

    let clipSortKey = "views";
    let clipSortDir = "desc";
    let currentDetail = null;

    const PERIOD_LABELS = {
      all: "Total Views",
      7: "Views (Last 7 Days)",
      30: "Views (Last 30 Days)",
      90: "Views (Last 90 Days)",
      365: "Views (Last 365 Days)",
      custom: "Views (Custom Range)",
    };

    function currentPeriodQuery() {
      const period = document.getElementById("periodFilter").value;
      if (period === "custom") {
        const start = document.getElementById("customStart").value;
        const end = document.getElementById("customEnd").value;
        if (!start || !end) return null;
        return `?period=custom&start=${start}&end=${end}`;
      }
      if (period === "all") return "";
      return `?period=${period}`;
    }

    function monthLabel(offset) {
      const d = new Date();
      d.setUTCDate(1);
      d.setUTCMonth(d.getUTCMonth() + offset);
      return d.toLocaleString("en-US", { month: "long", year: "numeric", timeZone: "UTC" });
    }

    function sortShorts(shorts) {
      const copy = [...shorts];
      copy.sort((a, b) => {
        let av, bv;
        if (clipSortKey === "date") {
          av = a.published_at ? new Date(a.published_at).getTime() : -Infinity;
          bv = b.published_at ? new Date(b.published_at).getTime() : -Infinity;
        } else {
          av = Number(a.latest_views);
          bv = Number(b.latest_views);
        }
        return clipSortDir === "asc" ? av - bv : bv - av;
      });
      return copy;
    }

    function sparklineSvg(history) {
      if (!history || history.length < 2) return "";
      const values = history.map((h) => Number(h.views));
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const w = 160, h = 28;
      const points = values
        .map((v, i) => {
          const x = (i / (values.length - 1)) * w;
          const y = h - ((v - min) / range) * h;
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        })
        .join(" ");
      return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${points}" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }

    function shortCardHtml(s) {
      const platformLabel = s.platform === "tiktok" ? "TikTok" : "YouTube";
      return `
        <div class="short-card">
          <img class="short-thumb" src="${esc(s.thumbnail_url || "")}" onerror="this.style.visibility='hidden'" />
          <div class="short-meta">
            <div class="short-title"><span class="platform-tag platform-tag-${esc(s.platform || "youtube")}">${platformLabel}</span> ${esc(s.title || "Untitled")}</div>
            <div class="short-views">${Number(s.latest_views).toLocaleString()} views · ${s.published_at ? `posted ${formatPostDate(s.published_at)}` : "fetching post date…"}</div>
            ${sparklineSvg(s.view_history)}
          </div>
        </div>
      `;
    }

    function platformSummaryBarHtml(shorts, rateViews, rateCents) {
      const yt = shorts.filter((s) => s.platform !== "tiktok");
      const tt = shorts.filter((s) => s.platform === "tiktok");
      if (yt.length === 0 || tt.length === 0) return "";
      const sumViews = (arr) => arr.reduce((sum, s) => sum + Number(s.latest_views), 0);
      const ytViews = sumViews(yt);
      const ttViews = sumViews(tt);
      const ytEarned = Math.floor((ytViews * rateCents) / rateViews);
      const ttEarned = Math.floor((ttViews * rateCents) / rateViews);
      return `
        <div class="platform-summary-bar">
          <div class="platform-summary-item">
            <span class="platform-tag platform-tag-youtube">YouTube</span>
            ${yt.length} clip${yt.length === 1 ? "" : "s"} · ${ytViews.toLocaleString()} views · ${formatMoney(ytEarned)}
          </div>
          <div class="platform-summary-item">
            <span class="platform-tag platform-tag-tiktok">TikTok</span>
            ${tt.length} clip${tt.length === 1 ? "" : "s"} · ${ttViews.toLocaleString()} views · ${formatMoney(ttEarned)}
          </div>
        </div>`;
    }

    function channelChipsHtml(channels, tiktokAccounts) {
      const youtubeChips = (channels || []).map(
        (ch) =>
          `<span class="channel-chip">${ch.thumbnail_url ? `<img class="channel-avatar" src="${esc(ch.thumbnail_url)}" />` : ""} ${esc(ch.channel_title || ch.channel_handle || ch.channel_id)}</span>`
      );
      const tiktokChips = (tiktokAccounts || []).map(
        (acc) =>
          `<span class="channel-chip channel-chip-tiktok">${acc.thumbnail_url ? `<img class="channel-avatar" src="${esc(acc.thumbnail_url)}" />` : ""} ${esc(acc.display_name || acc.username || acc.account_id)}</span>`
      );
      return `
        <div class="account-group"><span class="account-group-label">YT</span>${youtubeChips.length ? youtubeChips.join("") : `<span class="account-empty">Not linked</span>`}</div>
        <div class="account-group"><span class="account-group-label account-group-label-tiktok">TikTok</span>${tiktokChips.length ? tiktokChips.join("") : `<span class="account-empty">Not linked</span>`}</div>`;
    }

    function payoutsListHtml(payouts) {
      const rows = (payouts || [])
        .map(
          (p) => `
        <div class="payout-row" style="display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border);">
          <div>
            <span class="amount">${formatMoney(p.amount_cents)}</span>
            <span style="color: var(--muted); font-size: 12px; margin-left: 8px;">${formatDate(p.paid_at)}</span>
            ${p.note ? `<div style="color: var(--muted); font-size: 12px; margin-top: 2px;">${esc(p.note)}</div>` : ""}
          </div>
        </div>`
        )
        .join("");
      return rows || `<div style="padding: 10px 0; color: var(--muted); font-size: 12.5px;">No payouts recorded yet.</div>`;
    }

    function renderShorts() {
      if (!currentDetail) return;
      const sorted = sortShorts(currentDetail.shorts || []);
      document.getElementById("shortsBody").innerHTML = `
        ${platformSummaryBarHtml(currentDetail.shorts || [], currentDetail.rate_views, currentDetail.rate_cents)}
        <div class="shorts-grid" style="padding: 0 18px;">${sorted.map(shortCardHtml).join("") || `<span class="account-empty">No clips yet for this period.</span>`}</div>
      `;
    }

    async function loadClipper() {
      try {
        const query = currentPeriodQuery();
        if (query === null) return;
        const detail = await apiFetch(`/api/clippers/${clipperId}${query}`);
        currentDetail = detail;

        document.getElementById("clipperName").textContent = detail.name;
        document.getElementById("clipperNotes").textContent = detail.notes || "";
        document.getElementById("statShorts").textContent = Number(detail.period_short_count).toLocaleString();
        document.getElementById("statViews").textContent = Number(detail.period_views).toLocaleString();
        document.getElementById("statEarned").textContent = formatMoney(
          Math.floor((Number(detail.period_views) * detail.rate_cents) / detail.rate_views)
        );
        document.getElementById("statPaid").textContent = formatMoney(detail.paid_cents);

        const periodValue = document.getElementById("periodFilter").value;
        document.getElementById("statViewsLabel").textContent = PERIOD_LABELS[periodValue] || "Total Views";

        const notice = document.getElementById("historyNotice");
        if (periodValue !== "all" && detail.pending_date_count > 0) {
          notice.style.display = "block";
          notice.textContent =
            "Some clips are counted using an estimated post date while the real date is confirmed in the background — period totals may shift slightly until that finishes.";
        } else {
          notice.style.display = "none";
        }

        document.getElementById("channelsList").innerHTML = channelChipsHtml(detail.channels, detail.tiktok_accounts);
        document.getElementById("payoutsList").innerHTML = payoutsListHtml(detail.payouts);
        renderShorts();
      } catch (err) {
        document.getElementById("clipperName").textContent = "Not found";
        console.error(err.message);
      }
    }

    async function loadMonthlySnapshot() {
      try {
        const list = await apiFetch("/api/clippers");
        const c = list[0];
        if (!c) return;
        document.getElementById("monthlySnapshot").innerHTML = `
          <div class="stat-card">
            <div class="label" style="margin-bottom: 10px;">Owed for ${monthLabel(-1)}</div>
            <div class="amount" style="font-size: 20px; font-weight: 700;">${formatMoney(c.prev_month_owed_cents)}</div>
          </div>
          <div class="stat-card">
            <div class="label" style="margin-bottom: 10px;"><span class="live-dot"></span>Earned in ${monthLabel(0)} (live)</div>
            <div class="amount green" style="font-size: 20px; font-weight: 700;">${formatMoney(c.current_month_earned_cents)}</div>
          </div>`;
      } catch (err) {
        console.error("Failed to load monthly snapshot:", err.message);
      }
    }

    document.getElementById("periodFilter").addEventListener("change", (e) => {
      const customRow = document.getElementById("customRangeRow");
      if (e.target.value === "custom") {
        customRow.style.display = "flex";
        if (!document.getElementById("customStart").value) {
          const today = new Date();
          const weekAgo = new Date(today.getTime() - 7 * 86400000);
          document.getElementById("customStart").value = weekAgo.toISOString().slice(0, 10);
          document.getElementById("customEnd").value = today.toISOString().slice(0, 10);
        }
        loadClipper();
      } else {
        customRow.style.display = "none";
        loadClipper();
      }
    });
    document.getElementById("customApplyBtn").addEventListener("click", () => loadClipper());

    document.querySelector(".clip-sort-key").addEventListener("change", (e) => {
      clipSortKey = e.target.value;
      renderShorts();
    });
    document.querySelector(".clip-sort-dir").addEventListener("click", (e) => {
      clipSortDir = clipSortDir === "desc" ? "asc" : "desc";
      e.target.textContent = clipSortDir === "desc" ? "↓ Desc" : "↑ Asc";
      renderShorts();
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      window.location.href = "/login.html";
    });

    loadClipper();
    loadMonthlySnapshot();
    setInterval(loadClipper, 45000);
  </script>
</body>
</html>
