<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | Shorts Payout Tracker</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #0f172a;
      --muted: #6b7280;
      --accent: #4f46e5;
      --red: #dc2626;
      --red-soft: #fef2f2;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 8px rgba(15, 23, 42, 0.04);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }
    .login-card h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 4px;
    }
    .login-card p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 13.5px;
    }
    .field-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .login-card input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 18px;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .login-btn:hover {
      background: #4338ca;
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      background: var(--red-soft);
      color: var(--red);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div>
  <form class="login-card" id="loginForm">
    <h1>Shorts Payout Tracker</h1>
    <p>Sign in to view your clippers, views, and payouts.</p>

    <div class="field-label">Email or Username</div>
    <input type="text" id="email" name="email" placeholder="you@example.com" required autofocus>

    <div class="field-label">Password</div>
    <input type="password" id="password" name="password" placeholder="Password" required>

    <button type="submit" class="login-btn" id="loginBtn">Log In</button>
    <div class="login-error" id="loginError"></div>
  </form>
  <a class="back-link" href="../index.html">← Back to zxkie.com</a>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("loginError");
    const submitBtn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");
        window.location.href = data.role === "admin" ? "/" : `/client.html?id=${data.client_id}`;
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Log In";
      }
    });
  </script>
</body>
</html>
