<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | Shorts Payout Tracker</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #0f172a;
      --muted: #6b7280;
      --accent: #4f46e5;
      --red: #dc2626;
      --red-soft: #fef2f2;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 8px rgba(15, 23, 42, 0.04);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card-wrap { width: 100%; max-width: 380px; }
    .role-tabs {
      display: flex;
      gap: 6px;
      background: var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .role-tab {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      border-radius: 7px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
    }
    .role-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
    }
    .login-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 28px;
    }
    .login-card h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 4px;
    }
    .login-card p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 13.5px;
    }
    .field-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .login-card input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 18px;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .login-btn:hover {
      background: #4338ca;
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      background: var(--red-soft);
      color: var(--red);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card-wrap">
    <div class="role-tabs">
      <button type="button" class="role-tab active" id="clipperTab">Clipper Login</button>
      <button type="button" class="role-tab" id="clientTab">Client Login</button>
    </div>

    <form class="login-card" id="loginForm">
      <h1 id="loginTitle">Clipper Login</h1>
      <p id="loginSub">Sign in to view your stats, views, and payouts.</p>

      <div class="field-label">Email or Username</div>
      <input type="text" id="email" name="email" placeholder="you@example.com" required autofocus>

      <div class="field-label">Password</div>
      <input type="password" id="password" name="password" placeholder="Password" required>

      <button type="submit" class="login-btn" id="loginBtn">Log In</button>
      <div class="login-error" id="loginError"></div>
    </form>
    <a class="back-link" href="register.html" id="applyLink">Want to clip for us? Apply here →</a>
    <a class="back-link" href="https://abdirizak-byte.github.io/ZXK/">← Back to zxkie.com</a>
  </div>

  <script>
    const clipperTab = document.getElementById("clipperTab");
    const clientTab = document.getElementById("clientTab");
    const loginTitle = document.getElementById("loginTitle");
    const loginSub = document.getElementById("loginSub");
    const applyLink = document.getElementById("applyLink");

    function setTab(tab) {
      const isClipper = tab === "clipper";
      clipperTab.classList.toggle("active", isClipper);
      clientTab.classList.toggle("active", !isClipper);
      loginTitle.textContent = isClipper ? "Clipper Login" : "Client Login";
      loginSub.textContent = isClipper
        ? "Sign in to view your stats, views, and payouts."
        : "Sign in to view your roster, views, and payouts.";
      applyLink.style.display = isClipper ? "block" : "none";
    }
    clipperTab.addEventListener("click", () => setTab("clipper"));
    clientTab.addEventListener("click", () => setTab("client"));

    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("loginError");
    const submitBtn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");

        if (data.role === "admin") {
          window.location.href = "/";
        } else if (data.role === "clipper") {
          window.location.href = `/clipper.html?id=${data.clipper_id}`;
        } else {
          window.location.href = `/client.html?id=${data.client_id}`;
        }
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Log In";
      }
    });
  </script>
</body>
</html>
